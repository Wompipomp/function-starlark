name: Publish stdlib

on:
  push:
    tags: ['stdlib/v*']

permissions:
  packages: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install oras
        run: |
          curl -LO https://github.com/oras-project/oras/releases/download/v1.2.2/oras_1.2.2_linux_amd64.tar.gz
          tar xzf oras_1.2.2_linux_amd64.tar.gz
          sudo mv oras /usr/local/bin/

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push stdlib
        run: |
          cd stdlib
          VERSION=${GITHUB_REF#refs/tags/stdlib/}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          oras push ghcr.io/wompipomp/starlark-stdlib:${VERSION} \
            --artifact-type application/vnd.fn-starlark.modules+tar \
            networking.star naming.star labels.star conditions.star
          oras tag ghcr.io/wompipomp/starlark-stdlib:${VERSION} ${MAJOR}
