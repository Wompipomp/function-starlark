apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xstorageaccounts.example.io
  labels:
    provider: azure
spec:
  compositeTypeRef:
    apiVersion: example.io/v1
    kind: XStorageAccount
  mode: Pipeline
  pipeline:
    - step: create-resources
      functionRef:
        name: function-starlark
      input:
        apiVersion: starlark.fn.crossplane.io/v1alpha1
        kind: StarlarkInput
        spec:
          ociDefaultRegistry: ghcr.io/wompipomp
          source: |
            load("starlark-stdlib:v1/naming.star", "resource_name")
            load("starlark-stdlib:v1/labels.star", "standard_labels", "crossplane_labels", "merge_labels")

            # Schema definitions (opt-in validation)
            NetworkRules = schema("NetworkRules",
                default_action=field(type="string", enum=["Allow", "Deny"]),
                bypass=field(type="list"),
            )

            StorageAccountSpec = schema("StorageAccountSpec",
                location=field(type="string", required=True),
                account_tier=field(type="string", default="Standard"),
                account_replication_type=field(type="string", enum=["LRS", "GRS", "ZRS", "GZRS"]),
                account_kind=field(type="string", default="StorageV2"),
                min_tls_version=field(type="string", default="TLS1_2"),
                network_rules=field(type=NetworkRules),
                tags=field(type="dict"),
            )

            # Read XR spec
            location = get(oxr, "spec.location", "eastus")
            rg_name = get(oxr, "spec.resourceGroupName", "default-rg")

            # Build labels
            labels = merge_labels(
                standard_labels("storage", component="blob", part_of="data-platform"),
                crossplane_labels(),
                {"azure.io/location": location},
            )

            # Schema-validated resource
            sa_spec = StorageAccountSpec(
                location=location,
                account_replication_type="LRS",
                network_rules=NetworkRules(default_action="Deny", bypass=["AzureServices"]),
                tags={"ManagedBy": "crossplane"},
            )

            Resource("storage-account", {
                "apiVersion": "storage.azure.upbound.io/v1beta2",
                "kind": "Account",
                "metadata": {
                    "name": resource_name("storage"),
                    "labels": labels,
                },
                "spec": {"forProvider": sa_spec},
            })

            # Plain dict resource (no schema -- demonstrates opt-in)
            Resource("resource-group", {
                "apiVersion": "azure.upbound.io/v1beta1",
                "kind": "ResourceGroup",
                "metadata": {
                    "name": resource_name("rg"),
                    "labels": labels,
                },
                "spec": {
                    "forProvider": {
                        "location": location,
                        "tags": {"ManagedBy": "crossplane"},
                    },
                },
            })
    - step: detect-readiness
      functionRef:
        name: function-auto-ready
